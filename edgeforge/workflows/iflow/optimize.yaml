name: edgeforge_optimize
version: "2.0"
description: |
  Faithful workflow description of `OptimizationPipeline.run`. The
  pipeline owns the orchestration; this YAML names it once, with the
  same inputs and outputs the CLI passes to the pipeline module.

steps:
  - name: run_optimization_pipeline
    action: edgeforge.pipeline.OptimizationPipeline.run

    inputs:
      model_path: ${inputs.model_path}
      target: ${inputs.target_hardware}
      precision: ${inputs.precision}
      calibration_data: ${inputs.calibration_data}
      security_level: ${inputs.security_level}

      # The session_id propagates from caller to the audit chain. No
      # longer a constant.
      session_id: ${inputs.session_id}

    outputs:
      package_path: ${outputs.package_path}
      audit_hash: ${outputs.audit_hash}
      session_id: ${outputs.session_id}

inputs:
  model_path:
    type: file
    required: true
    description: Path to input model
  target_hardware:
    type: string
    required: true
    description: |
      Jetson / Xilinx / generic-arm family. If unset, the pipeline
      calls auto_detect_hardware() at runtime.
  precision:
    type: string
    default: INT8
    enum: [FP16, INT8, INT4]
  calibration_data:
    type: file
    required: false
    description: Path to calibration dataset (for INT8)
  security_level:
    type: string
    default: IL4
    enum: [IL4, IL5, IL6]
  session_id:
    type: string
    required: false
    description: |
      Session id for the audit chain. Auto-generated (uuid4) when
      omitted. The legacy constant "SESSION_123" / "IFLOW_SESSION"
      are gone.

outputs:
  package_path:
    type: file
    description: Final deployment package
  audit_hash:
    type: string
    description: Cryptographic hash of the audit trail's final chain entry
  session_id:
    type: string
    description: The session id under which the run was audited
